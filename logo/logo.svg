<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Humberstack Logo - |||= Design -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Three vertical bars ||| -->
  <rect x="35" y="73" width="18" height="80" rx="4" fill="url(#logoGradient)"/>
  <rect x="61" y="73" width="18" height="80" rx="4" fill="url(#logoGradient)"/>
  <rect x="87" y="73" width="18" height="80" rx="4" fill="url(#logoGradient)"/>
  
  <!-- Three horizontal bars = -->
  <rect x="111" y="77" width="30" height="18" rx="4" fill="url(#logoGradient)"/>
  <rect x="111" y="104" width="30" height="18" rx="4" fill="url(#logoGradient)"/>
  <rect x="111" y="131" width="30" height="18" rx="4" fill="url(#logoGradient)"/>
</svg>
