<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

<!--
=====================================================================
HUMBERSTACK ICON ONLY - VERSION 1.0 - PRODUCTION MASTER
=====================================================================
Square icon version for favicons, app icons, and profile pictures.
Based on the master logo symbol.

Created: 2026-04-16
=====================================================================
-->

<!-- BACKGROUND -->
<rect x="0" y="0" width="200" height="200" fill="#1a1a1a" rx="20"/>

<!-- |||= icon - centered and scaled for square format -->
<g transform="translate(35, 83)">
  <!-- Three vertical bars (|||) -->
  <rect x="0" y="0" width="18" height="60" rx="4" fill="#ffffff"/>
  <rect x="26" y="0" width="18" height="60" rx="4" fill="#ffffff"/>
  <rect x="52" y="0" width="18" height="60" rx="4" fill="#ffffff"/>
  
  <!-- Three horizontal bars (=) -->
  <rect x="75" y="0" width="35" height="18" rx="4" fill="#ffffff"/>
  <rect x="75" y="21" width="35" height="18" rx="4" fill="#ffffff"/>
  <rect x="75" y="42" width="35" height="18" rx="4" fill="#ffffff"/>
</g>

<!-- Subtle highlight for depth -->
<rect x="0" y="0" width="200" height="2" rx="1" fill="#ffffff" opacity="0.08"/>

</svg>
