<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="description" content="Page not found - Humberstack">
    <title>404 - Page Not Found | Humberstack</title>
    <link rel="stylesheet" href="styles.css">

        .error-page {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;

            padding: 2rem;
        }
        .error-content h1 {
            font-size: 6rem;

            margin-bottom: 1rem;

        .error-content h2 {
            font-size: 2rem;

        }
        .error-content p {
            color: var(--text-light);
            margin-bottom: 2rem;
        }

<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <a href="index.html">Humberstack</a>
            </div>

                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>

            <h1>404</h1>

            <p>Sorry, the page you're looking for doesn't exist.</p>
            <a href="index.html" class="btn btn-primary">Go Home</a>

    <footer>
