<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Humberstack Favicon - |||= Design -->
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Three vertical bars ||| -->
  <rect x="3" y="7" width="4" height="18" rx="1" fill="url(#faviconGradient)"/>
  <rect x="9" y="7" width="4" height="18" rx="1" fill="url(#faviconGradient)"/>
  <rect x="15" y="7" width="4" height="18" rx="1" fill="url(#faviconGradient)"/>
  
  <!-- Three horizontal bars = -->
  <rect x="21" y="9" width="8" height="4" rx="1" fill="url(#faviconGradient)"/>
  <rect x="21" y="14" width="8" height="4" rx="1" fill="url(#faviconGradient)"/>
  <rect x="21" y="19" width="8" height="4" rx="1" fill="url(#faviconGradient)"/>
</svg>
